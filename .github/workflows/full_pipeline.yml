name: Full Pipeline — Pathfinder + Engine Scraper

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: write

jobs:
  full-run:
    runs-on: ubuntu-latest
    environment: Production

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pathfinder — discover URLs & apps
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/pathfinder.py

      - name: Run Engine Scraper — scrape & structure data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/engine_scraper.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/sources.json config/apps.json data/
          if git diff --cached --quiet; then
            echo "No changes detected — skipping commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "Full Pipeline Run [$TIMESTAMP]"
            git push
          fi
